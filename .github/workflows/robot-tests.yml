name: Robot Framework CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
      - cron: '30 0 * * *'

jobs:
  robot-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ROBOT_PROJECT_NAME: "Project1"

    steps:
      # ------------------------------------------------------------------
      # 1. RECUPERATION DU CODE SOURCE
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. INSTALLATION DE PYTHON
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # ------------------------------------------------------------------
      # 3. INSTALLATION DES DEPENDANCES
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install robotframework robotframework-browser -q > /dev/null 2>&1
          python -m Browser.entry init > /dev/null 2>&1

      # ------------------------------------------------------------------
      # 4. CALCUL DU NOM DE L'EXECUTION
      #    Format : Project1 | main | 2025-06-13 14:30
      # ------------------------------------------------------------------
      - name: Compute execution name
        id: exec_meta
        run: |
          EXEC_DATE=$(TZ="Africa/Casablanca" date "+%Y-%m-%d %H:%M")
          BRANCH="${GITHUB_REF_NAME:-unknown}"

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            TRIGGER="Execution planifiee"
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TRIGGER="Pull Request #${{ github.event.number }}"
          else
            TRIGGER="Push"
          fi

          EXEC_NAME="[Auto][${{ env.ROBOT_PROJECT_NAME }}] ${BRANCH} | ${EXEC_DATE}"
          EXEC_SUMMARY="${TRIGGER} - ${BRANCH} - ${EXEC_DATE}"

          echo "exec_name=${EXEC_NAME}"       >> $GITHUB_OUTPUT
          echo "exec_summary=${EXEC_SUMMARY}" >> $GITHUB_OUTPUT
          echo "exec_date=${EXEC_DATE}"       >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}"             >> $GITHUB_OUTPUT
          echo "trigger=${TRIGGER}"           >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 5. EXECUTION DES TESTS ROBOT FRAMEWORK
      # ------------------------------------------------------------------
      - name: Run Robot Framework Tests
        run: |
          robot \
            --outputdir Result \
            --output output.xml \
            --log log.html \
            --report report.html \
            --variable BROWSER:chromium \
            Tests/ > /dev/null 2>&1 || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -le 5 ]; then
            exit 0
          else
            exit ${EXIT_CODE}
          fi

      # ------------------------------------------------------------------
      # 6. LISTE DES SCREENSHOTS CAPTURES
      # ------------------------------------------------------------------
      - name: List captured screenshots
        if: always()
        run: find Result/ -name "*.png" -o -name "*.jpg" 2>/dev/null > /dev/null

      # ------------------------------------------------------------------
      # 7. AUTHENTIFICATION XRAY
      # ------------------------------------------------------------------
      - name: Authenticate to Xray
        shell: bash
        run: |
          TOKEN=$(curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
            https://eu.xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # 8. INSTALLATION DE JQ
      # ------------------------------------------------------------------
      - name: Install jq
        run: sudo apt-get install -y jq > /dev/null 2>&1

      # ------------------------------------------------------------------
      # 9. ENVOI DES RESULTATS VERS XRAY
      # ------------------------------------------------------------------
      - name: Upload results to Xray
        shell: bash
        env:
          EXEC_NAME:    ${{ steps.exec_meta.outputs.exec_name }}
          EXEC_SUMMARY: ${{ steps.exec_meta.outputs.exec_summary }}
          EXEC_DATE:    ${{ steps.exec_meta.outputs.exec_date }}
          BRANCH:       ${{ steps.exec_meta.outputs.branch }}
          TRIGGER:      ${{ steps.exec_meta.outputs.trigger }}
        run: |
          if [ ! -f Result/output.xml ]; then
            exit 1
          fi

          TOTAL=$(grep -o 'status="PASS"\|status="FAIL"' Result/output.xml | wc -l)
          PASSED=$(grep -o 'status="PASS"' Result/output.xml | wc -l)
          FAILED=$(grep -o 'status="FAIL"' Result/output.xml | wc -l)

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            TRIGGER_DESC="planifiee automatiquement"
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TRIGGER_DESC="declenchee par une Pull Request"
          else
            TRIGGER_DESC="declenchee manuellement (Push)"
          fi
          DESC="Cette execution de tests a ete ${TRIGGER_DESC} le ${EXEC_DATE} sur la branche ${BRANCH}. Projet : ${{ env.ROBOT_PROJECT_NAME }}. Resultats : ${PASSED} tests passes, ${FAILED} tests echoues sur ${TOTAL} au total."

          jq -n \
            --arg summary "${EXEC_NAME}" \
            --arg desc    "${DESC}"      \
            --arg project "QATEAM"       \
            '{
              fields: {
                project:     { key: $project },
                summary:     $summary,
                issuetype:   { name: "Test Execution" },
                description: $desc
              }
            }' > /tmp/xray_info.json

          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -F "info=@/tmp/xray_info.json;type=application/json" \
            -F "results=@Result/output.xml;type=text/xml" \
            "https://eu.xray.cloud.getxray.app/api/v2/import/execution/robot/multipart")

          EXEC_KEY=$(echo "$RESPONSE" | jq -r '.testExecIssue.key // .key // empty')

          if [ -z "$EXEC_KEY" ] || [ "$EXEC_KEY" = "null" ]; then
            RESPONSE=$(curl -s \
              -X POST \
              -H "Authorization: Bearer $XRAY_TOKEN" \
              -H "Content-Type: text/xml" \
              --data @"Result/output.xml" \
              "https://eu.xray.cloud.getxray.app/api/v2/import/execution/robot?projectKey=QATEAM")

            EXEC_KEY=$(echo "$RESPONSE" | jq -r '.testExecIssue.key // .key // empty')
          fi

          if [ -z "$EXEC_KEY" ] || [ "$EXEC_KEY" = "null" ]; then
            exit 1
          fi

          curl -s -X PUT \
            -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
            -H "Content-Type: application/json" \
            --data "{\"fields\":{\"summary\":\"${EXEC_NAME}\"}}" \
            "https://hindmoustainbillah29.atlassian.net/rest/api/3/issue/${EXEC_KEY}" \
            > /dev/null

          echo "EXEC_KEY=$EXEC_KEY"                         >> $GITHUB_ENV
          echo "EXEC_STATS=${PASSED}P/${FAILED}F/${TOTAL}T" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # 10. CREATION AUTOMATIQUE DE BUGS JIRA
      # ------------------------------------------------------------------
      - name: Creer bugs Jira pour tests echoues
        if: always()
        env:
          JIRA_USER:         ${{ secrets.JIRA_USER }}
          JIRA_API_TOKEN:    ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL:     https://hindmoustainbillah29.atlassian.net
          PROJECT_KEY:       QATEAM
          EXEC_KEY:          ${{ env.EXEC_KEY }}
          ROBOT_PROJECT:     ${{ env.ROBOT_PROJECT_NAME }}
          BRANCH:            ${{ steps.exec_meta.outputs.branch }}
          EXEC_DATE:         ${{ steps.exec_meta.outputs.exec_date }}
          TRIGGER:           ${{ steps.exec_meta.outputs.trigger }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import json, os, re, urllib.request, urllib.error, base64, glob, mimetypes, sys

          USER          = os.environ["JIRA_USER"]
          TOKEN         = os.environ["JIRA_API_TOKEN"]
          BASE          = os.environ["JIRA_BASE_URL"]
          PROJ          = os.environ["PROJECT_KEY"]
          EXEC_KEY      = os.environ.get("EXEC_KEY", "")
          ROBOT_PROJECT = os.environ.get("ROBOT_PROJECT", "Project1")
          BRANCH        = os.environ.get("BRANCH", "unknown")
          EXEC_DATE     = os.environ.get("EXEC_DATE", "")
          TRIGGER       = os.environ.get("TRIGGER", "")
          RUN_URL       = (
              f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}"
              f"/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"
          )

          creds   = base64.b64encode(f"{USER}:{TOKEN}".encode()).decode()
          headers = {
              "Authorization": f"Basic {creds}",
              "Content-Type":  "application/json",
              "Accept":        "application/json"
          }

          def jira(method, path, data=None):
              req = urllib.request.Request(
                  f"{BASE}/rest/api/3/{path}",
                  data=json.dumps(data).encode() if data else None,
                  headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      body = r.read().decode()
                      return json.loads(body) if body.strip() else {}
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()[:200]}

          def attach_file(issue_key, filepath):
              filename = os.path.basename(filepath)
              mime     = mimetypes.guess_type(filepath)[0] or "application/octet-stream"
              boundary = "----RobotCIBoundary"
              with open(filepath, "rb") as f:
                  file_data = f.read()
              body = (
                  f"--{boundary}\r\n"
                  f"Content-Disposition: form-data; name=\"file\"; filename=\"{filename}\"\r\n"
                  f"Content-Type: {mime}\r\n\r\n"
              ).encode() + file_data + f"\r\n--{boundary}--\r\n".encode()
              attach_headers = {
                  "Authorization":     f"Basic {creds}",
                  "X-Atlassian-Token": "no-check",
                  "Content-Type":      f"multipart/form-data; boundary={boundary}"
              }
              req = urllib.request.Request(
                  f"{BASE}/rest/api/3/issue/{issue_key}/attachments",
                  data=body, headers=attach_headers, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      resp = json.loads(r.read().decode())
                      if isinstance(resp, list) and resp:
                          return resp[0].get("id"), resp[0].get("content")
              except urllib.error.HTTPError:
                  pass
              return None, None

          def priority(msg):
              m = msg.lower()
              if any(k in m for k in ["critical", "crash", "timeout", "connection", "refused"]):
                  return "High"
              if any(k in m for k in ["assert", "expected", "found", "not found", "should be", "should contain"]):
                  return "Medium"
              return "Low"

          def bug_exists(summary):
              safe = summary.replace("\\", "\\\\").replace('"', '\\"')
              jql_open = urllib.request.quote(
                  f'project={PROJ} AND issuetype=Bug AND summary="{safe}" AND statusCategory != Done')
              r = jira("GET", f"search?jql={jql_open}&maxResults=1&fields=summary,status")
              if r.get("total", 0) > 0:
                  return r["issues"][0]["key"]
              return None

          def link_to_execution(bug_key):
              if not EXEC_KEY:
                  return
              jira("POST", "issueLink", {
                  "type":         {"name": "Blocks"},
                  "inwardIssue":  {"key": bug_key},
                  "outwardIssue": {"key": EXEC_KEY}
              })

          def get_error_details(test, st):
              main_msg = st.get("message", "").strip()
              error_lines = []
              for el in test.iter("msg"):
                  if el.get("level") in ("FAIL", "ERROR") and el.text:
                      line = el.text.strip()
                      if line and line not in error_lines:
                          error_lines.append(line)
              failed_keyword  = None
              keyword_args    = []
              keyword_library = None
              for kw in test.iter("kw"):
                  kst = kw.find("status")
                  if kst is not None and kst.get("status") == "FAIL":
                      failed_keyword  = kw.get("name", "")
                      keyword_library = kw.get("library", "")
                      for arg in kw.iter("arg"):
                          if arg.text:
                              keyword_args.append(arg.text.strip())
                      break
              return {
                  "main":    main_msg or (error_lines[0] if error_lines else "Aucun message"),
                  "lines":   error_lines,
                  "keyword": failed_keyword,
                  "args":    keyword_args,
                  "library": keyword_library
              }

          def find_screenshot(test_name):
              clean = test_name.replace(" ", "*").replace("/", "*")
              for pattern in [
                  f"Result/*{clean}*.png",
                  f"Result/*{clean}*.jpg",
                  "Result/browser/screenshot/*.png",
                  "Result/browser/screenshot/*.jpg",
                  "Result/*.png",
                  "Result/*.jpg"
              ]:
                  files = sorted(glob.glob(pattern))
                  if files:
                      return files[-1]
              return None

          def human_error(error, test_name):
              msg = error["main"]
              kw  = error.get("keyword") or "inconnu"

              m = re.search(r"Text '(.+?)' \(str\) should be '(.+?)' \(str\)", msg)
              if m:
                  actual, expected = m.group(1), m.group(2)
                  return (
                      f"Le test a detecte un titre ou un texte incorrect sur la page.\n"
                      f"Valeur affichee sur la page : '{actual}'\n"
                      f"Valeur attendue par le test : '{expected}'\n\n"
                      f"Le contenu de la page ne correspond pas au resultat attendu."
                  )

              m = re.search(
                  r"'(.+?)' should (contain|be equal to|not contain|start with|end with) '(.+?)'",
                  msg, re.IGNORECASE)
              if m:
                  return (
                      f"Une assertion a echoue dans le test '{test_name}'.\n"
                      f"Valeur obtenue : '{m.group(1)}'\n"
                      f"Condition attendue : {m.group(2)} '{m.group(3)}'"
                  )

              if "timeout" in msg.lower():
                  return (
                      f"Le test a expire (timeout) lors de l'execution du keyword '{kw}'.\n"
                      f"L'element ou la page attendue n'a pas repondu dans le delai imparti.\n"
                      f"Detail technique : {msg}"
                  )

              if "element" in msg.lower() and any(
                      k in msg.lower() for k in ["not found", "not visible", "not attached"]):
                  return (
                      f"Un element de la page est introuvable ou non visible "
                      f"lors de l'execution du keyword '{kw}'.\n"
                      f"Detail technique : {msg}"
                  )

              return (
                  f"Le test '{test_name}' a echoue lors de l'execution du keyword '{kw}'.\n"
                  f"Detail technique : {msg}"
              )

          def build_steps(test_name, suite_name, error):
              msg  = error["main"]
              kw   = error.get("keyword") or ""
              args = error.get("args", [])

              m_title = re.search(r"Text '(.+?)' \(str\) should be '(.+?)' \(str\)", msg)
              m_assert = re.search(
                  r"'(.+?)' should (contain|be equal to|not contain|start with|end with) '(.+?)'",
                  msg, re.IGNORECASE)

              if m_title:
                  actual, expected = m_title.group(1), m_title.group(2)
                  steps = [
                      f"Ouvrir un navigateur et acceder a l'application testee.",
                      f"Naviguer vers la page correspondant a la suite '{suite_name}'.",
                      f"Verifier le titre ou le texte affiche sur la page : la valeur presente est '{actual}'.",
                      f"Comparer avec la valeur attendue : '{expected}'.",
                      f"Constater que les deux valeurs ne correspondent pas : bug confirme.",
                      f"Identifier si le probleme vient de l'application (contenu incorrect) ou du test (valeur attendue a corriger).",
                      f"Consulter le screenshot joint pour voir l'etat exact de la page au moment de l'echec."
                  ]
              elif m_assert:
                  actual, cond, expected = m_assert.group(1), m_assert.group(2), m_assert.group(3)
                  steps = [
                      f"Ouvrir un navigateur et acceder a l'application testee.",
                      f"Naviguer vers la page concernee par le test '{test_name}'.",
                      f"Localiser l'element ou la zone de contenu impliquee.",
                      f"Verifier que la valeur affichee est '{actual}'.",
                      f"Comparer avec la valeur attendue : le contenu devrait {cond} '{expected}'.",
                      f"Constater la difference et determiner l'origine du probleme.",
                      f"Consulter le screenshot joint pour voir l'etat de la page au moment de l'echec."
                  ]
              elif "timeout" in msg.lower():
                  steps = [
                      f"Ouvrir un navigateur et acceder a l'application testee.",
                      f"Naviguer vers la page concernee par le test '{test_name}'.",
                      f"Effectuer l'action correspondant a l'etape '{kw}' et observer la reponse de la page.",
                      f"Constater que la page ou l'element attendu ne s'affiche pas dans un delai raisonnable.",
                      f"Verifier que l'application est accessible et que le reseau est stable.",
                      f"Tester sur un autre poste ou environnement pour confirmer si le probleme est reproductible.",
                      f"Consulter le screenshot joint pour voir l'etat de la page au moment du timeout."
                  ]
              elif "element" in msg.lower() and any(
                      k in msg.lower() for k in ["not found", "not visible", "not attached"]):
                  selector = args[0] if args else "element inconnu"
                  steps = [
                      f"Ouvrir un navigateur et acceder a l'application testee.",
                      f"Naviguer vers la page concernee par le test '{test_name}'.",
                      f"Rechercher visuellement l'element suivant sur la page : {selector}.",
                      f"Constater que l'element est absent, masque ou non charge.",
                      f"Inspecter le code source de la page (F12) pour verifier la presence de l'element dans le DOM.",
                      f"Verifier si une modification recente de l'interface a change ou supprime cet element.",
                      f"Consulter le screenshot joint pour voir l'etat de la page au moment de l'echec."
                  ]
              else:
                  steps = [
                      f"Ouvrir un navigateur et acceder a l'application testee.",
                      f"Naviguer vers la page correspondant a la suite '{suite_name}'.",
                      f"Reproduire manuellement les actions du test '{test_name}'.",
                      f"Observer le comportement de l'application a l'etape '{kw}' si applicable.",
                      f"Comparer le comportement obtenu avec le comportement attendu.",
                      f"Consulter le log complet dans les artefacts du run CI/CD pour le detail de l'execution.",
                      f"Consulter le screenshot joint pour voir l'etat de la page au moment de l'echec."
                  ]

              return steps

          def build_description(test_name, suite_name, error, has_screenshot=False):

              def para(text):
                  return {"type": "paragraph",
                          "content": [{"type": "text", "text": text}]}

              def heading(text, level=3):
                  return {"type": "heading", "attrs": {"level": level},
                          "content": [{"type": "text", "text": text}]}

              def rule():
                  return {"type": "rule"}

              def code_block(text):
                  return {"type": "codeBlock", "attrs": {"language": "text"},
                          "content": [{"type": "text", "text": text}]}

              def bullet_list(items):
                  return {
                      "type": "bulletList",
                      "content": [
                          {"type": "listItem", "content": [para(item)]}
                          for item in items
                      ]
                  }

              def ordered_list(items):
                  return {
                      "type": "orderedList",
                      "content": [
                          {"type": "listItem", "content": [para(item)]}
                          for item in items
                      ]
                  }

              content = []

              content.append(heading("Identification du test", 3))
              content.append(bullet_list([
                  f"Projet Robot Framework : {ROBOT_PROJECT}",
                  f"Suite : {suite_name}",
                  f"Test : {test_name}",
                  f"Date d'execution : {EXEC_DATE}",
                  f"Declenchement : {TRIGGER}"
              ]))
              content.append(rule())

              content.append(heading("Bug detecte", 3))
              for line in human_error(error, test_name).split("\n"):
                  if line.strip():
                      content.append(para(line.strip()))
              if error.get("lines") and len(error["lines"]) > 1:
                  content.append(heading("Detail technique", 4))
                  content.append(code_block("\n".join(error["lines"])))
              content.append(rule())

              content.append(heading("Etapes de reproduction", 3))
              content.append(ordered_list(build_steps(test_name, suite_name, error)))
              content.append(rule())

              content.append(heading("Liens utiles", 3))
              link_items = [f"Run CI/CD : {RUN_URL}"]
              if EXEC_KEY:
                  link_items.append(f"Test Execution Xray : {BASE}/browse/{EXEC_KEY}")
              if has_screenshot:
                  link_items.append("Screenshot : voir piece jointe attachee au ticket")
              content.append(bullet_list(link_items))

              return {"version": 1, "type": "doc", "content": content}

          try:
              root = ET.parse("Result/output.xml").getroot()
          except Exception:
              sys.exit(0)

          fails = []
          for suite in root.iter("suite"):
              suite_name = suite.get("name", "Suite inconnue")
              for test in suite.findall("test"):
                  st = test.find("status")
                  if st is not None and st.get("status") == "FAIL":
                      fails.append({
                          "name":  test.get("name", "?"),
                          "suite": suite_name,
                          "error": get_error_details(test, st)
                      })

          if not fails:
              sys.exit(0)

          for t in fails:
              summary = f"[{ROBOT_PROJECT}] {t['name']}"
              key     = bug_exists(summary)

              if key:
                  link_to_execution(key)
                  continue

              screenshot_path = find_screenshot(t["name"])
              has_screenshot  = screenshot_path is not None
              prio            = priority(t["error"]["main"])
              desc            = build_description(t["name"], t["suite"], t["error"], has_screenshot)

              payload = {"fields": {
                  "project":     {"key": PROJ},
                  "summary":     summary,
                  "issuetype":   {"name": "Bug"},
                  "priority":    {"name": prio},
                  "labels":      ["automated", "robot-framework", "ci-cd", ROBOT_PROJECT.lower()],
                  "description": desc
              }}

              r = jira("POST", "issue", payload)

              if r.get("key"):
                  new_key = r["key"]
                  if screenshot_path:
                      attach_file(new_key, screenshot_path)
                  link_to_execution(new_key)
          PYEOF

      # ------------------------------------------------------------------
      # 11. SAUVEGARDE DES ARTEFACTS
      # ------------------------------------------------------------------
      - name: Upload Robot Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/