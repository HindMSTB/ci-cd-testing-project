name: Robot Framework CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 8 * * 5'   # Vendredi 9h Maroc

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install robotframework robotframework-browser
          python -m Browser.entry init

      - name: Run Robot Framework Tests
        continue-on-error: true
        run: |
          robot \
            --outputdir Result \
            --output output.xml \
            --log log.html \
            --report report.html \
            Tests/

      - name: Authenticate to Xray
        shell: bash
        run: |
          TOKEN=$(curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
            https://eu.xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Upload results to Xray
        shell: bash
        run: |
          if [ ! -f Result/output.xml ]; then
            echo "❌ output.xml not found"
            exit 1
          fi

          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -H "Content-Type: text/xml" \
            --data @"Result/output.xml" \
            "https://eu.xray.cloud.getxray.app/api/v2/import/execution/robot?projectKey=QATEAM")

          echo "===== XRAY RESPONSE ====="
          echo "$RESPONSE"

          EXEC_KEY=$(echo "$RESPONSE" | jq -r '.testExecIssue.key // .key')

          if [ "$EXEC_KEY" = "null" ] || [ -z "$EXEC_KEY" ]; then
            echo "❌ Failed to create Test Execution"
            exit 1
          fi

          echo "=================================="
          echo "✅ Test Execution Created: $EXEC_KEY"
          echo "🔗 https://hindmoustainbillah29.atlassian.net/browse/$EXEC_KEY"
          echo "=================================="

      - name: Créer bugs Jira pour tests échoués
        if: always()
        env:
          JIRA_USER:      ${{ secrets.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL:  https://hindmoustainbillah29.atlassian.net
          PROJECT_KEY:    QATEAM
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, json, os, urllib.request, urllib.error, base64

          USER  = os.environ["JIRA_USER"]
          TOKEN = os.environ["JIRA_API_TOKEN"]
          BASE  = os.environ["JIRA_BASE_URL"]
          PROJ  = os.environ["PROJECT_KEY"]
          RUN   = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"

          creds   = base64.b64encode(f"{USER}:{TOKEN}".encode()).decode()
          headers = {"Authorization": f"Basic {creds}", "Content-Type": "application/json", "Accept": "application/json"}

          def jira(method, path, data=None):
              req = urllib.request.Request(
                  f"{BASE}/rest/api/3/{path}",
                  data=json.dumps(data).encode() if data else None,
                  headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read().decode())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()}

          def priority(msg):
              m = msg.lower()
              if any(k in m for k in ["critical","crash","timeout","connection"]): return "High"
              if any(k in m for k in ["assert","expected","found","not found"]): return "Medium"
              return "Low"

          def bug_exists(name):
              safe = name.replace('"', '\\"')
              jql  = urllib.request.quote(f'project={PROJ} AND issuetype=Bug AND summary~"[Robot] {safe}" AND statusCategory != Done')
              r    = jira("GET", f"search?jql={jql}&maxResults=1&fields=summary")
              return r["issues"][0]["key"] if r.get("total", 0) > 0 else None

          def get_msg(test, st):
              msg = st.get('message', '').strip()
              if msg: return msg
              for el in test.iter('msg'):
                  if el.get('level') in ('FAIL','ERROR') and el.text: return el.text.strip()
              for kw in test.iter('kw'):
                  kst = kw.find('status')
                  if kst is not None and kst.get('status') == 'FAIL':
                      for el in kw.iter('msg'):
                          if el.text: return el.text.strip()
              return 'Aucun message'

          try:
              root = ET.parse("Result/output.xml").getroot()
          except Exception as e:
              print(f"❌ {e}"); exit(0)

          fails = []
          for test in root.iter("test"):
              st = test.find("status")
              if st is not None and st.get("status") == "FAIL":
                  fails.append({"name": test.get("name","?"), "msg": get_msg(test, st)})

          if not fails:
              print("✅ Aucun test échoué — pas de bug à créer."); exit(0)

          print(f"\n{'='*60}\n  🐛 BUGS JIRA\n{'='*60}\n")
          created = skipped = errors = 0

          for t in fails:
              key = bug_exists(t["name"])
              if key:
                  print(f"  ⏭️  SKIP (déjà ouvert → {key}) : {t['name']}")
                  skipped += 1
                  continue

              prio    = priority(t["msg"])
              payload = {"fields": {
                  "project":     {"key": PROJ},
                  "summary":     f"[Robot] {t['name']}",
                  "issuetype":   {"name": "Bug"},
                  "priority":    {"name": prio},
                  "labels":      ["automated", "robot-framework", "ci-cd"],
                  "description": {"version": 1, "type": "doc", "content": [
                      {"type": "paragraph", "content": [{"type": "text", "text": "🤖 Bug CI/CD Robot Framework"}]},
                      {"type": "paragraph", "content": [{"type": "text", "text": f"📋 Test : {t['name']}"}]},
                      {"type": "paragraph", "content": [{"type": "text", "text": f"❌ Erreur : {t['msg']}"}]},
                      {"type": "paragraph", "content": [{"type": "text", "text": f"🔗 Run : {RUN}"}]}
                  ]}
              }}

              r = jira("POST", "issue", payload)
              if r.get("key"):
                  print(f"  🐛 CRÉÉ [{prio:<6}] → {r['key']} : {t['name']}")
                  created += 1
              else:
                  print(f"  ❌ ERREUR : {t['name']} — {str(r.get('error','?'))[:60]}")
                  errors += 1

          print(f"\n{'='*60}")
          print(f"  ✅ Créés: {created}  ⏭️  Ignorés: {skipped}" + (f"  ❌ Erreurs: {errors}" if errors else ""))
          print(f"{'='*60}")
          PYEOF

      - name: Upload Robot Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/