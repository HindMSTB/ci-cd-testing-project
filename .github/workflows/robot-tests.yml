name: Robot Framework CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-browser

      - name: Install Playwright Browsers
        run: |
          python -m Browser.entry init

      - name: Run Robot Framework Tests
        run: |
          python -m robot -d Result Tests/ || true

      # 🔥 Résumé GLOBAL (uniquement les tests)
      - name: Generate Summary
        run: |
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY

          PASS_COUNT=$(grep '<test ' Result/output.xml | grep 'status="PASS"' | wc -l)
          FAIL_COUNT=$(grep '<test ' Result/output.xml | grep 'status="FAIL"' | wc -l)

          echo "| PASS | $PASS_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| FAIL | $FAIL_COUNT |" >> $GITHUB_STEP_SUMMARY

      # 🔥 Tableau DÉTAILLÉ (test par test correct)
      - name: Detailed Test Results
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧪 Detailed Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test Case | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          awk '
          /<test name=/ {
              match($0, /name="([^"]+)"/, name)
          }
          /<status status=/ {
              match($0, /status="([^"]+)"/, status)
              print name[1] "," status[1]
          }' Result/output.xml | while IFS=, read name status; do
              if [ "$status" = "PASS" ]; then
                  echo "| $name | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
              else
                  echo "| $name | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
          done

      # 📦 Upload des rapports
      - name: Upload Robot Results
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/