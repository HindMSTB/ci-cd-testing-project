name: Robot Framework CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
   - cron: '0 1 * * *'

jobs:
  robot-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ROBOT_PROJECT_NAME: "Project1"

    steps:
      # ------------------------------------------------------------------
      # 1. RECUPERATION DU CODE SOURCE
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. INSTALLATION DE PYTHON
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # ------------------------------------------------------------------
      # 3. INSTALLATION DES DEPENDANCES
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install robotframework robotframework-browser
          python -m Browser.entry init

      # ------------------------------------------------------------------
      # 4. CALCUL DU NOM DE L'EXECUTION
      #    Format : Project1 | main | 2025-06-13 14:30
      # ------------------------------------------------------------------
      - name: Compute execution name
        id: exec_meta
        run: |
          EXEC_DATE=$(TZ="Africa/Casablanca" date "+%Y-%m-%d %H:%M")
          BRANCH="${GITHUB_REF_NAME:-unknown}"

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            TRIGGER="Execution planifiee"
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TRIGGER="Pull Request #${{ github.event.number }}"
          else
            TRIGGER="Push"
          fi

          EXEC_NAME="[Auto][${{ env.ROBOT_PROJECT_NAME }}] ${BRANCH} | ${EXEC_DATE}"
          EXEC_SUMMARY="${TRIGGER} - ${BRANCH} - ${EXEC_DATE}"

          echo "exec_name=${EXEC_NAME}"       >> $GITHUB_OUTPUT
          echo "exec_summary=${EXEC_SUMMARY}" >> $GITHUB_OUTPUT
          echo "exec_date=${EXEC_DATE}"       >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}"             >> $GITHUB_OUTPUT
          echo "trigger=${TRIGGER}"           >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 5. EXECUTION DES TESTS ROBOT FRAMEWORK
      # ------------------------------------------------------------------
      - name: Run Robot Framework Tests
        run: |
          robot \
            --outputdir Result \
            --output output.xml \
            --log log.html \
            --report report.html \
            --variable BROWSER:chromium \
            Tests/ || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -le 5 ]; then
            echo "Robot termine avec exit code ${EXIT_CODE:-0} (normal)"
            exit 0
          else
            echo "Erreur critique Robot Framework (exit code ${EXIT_CODE})"
            exit ${EXIT_CODE}
          fi

      # ------------------------------------------------------------------
      # 6. LISTE DES SCREENSHOTS CAPTURES
      # ------------------------------------------------------------------
      - name: List captured screenshots
        if: always()
        run: |
          echo "Screenshots disponibles :"
          find Result/ -name "*.png" -o -name "*.jpg" 2>/dev/null | sort || echo "Aucun screenshot trouve"

      # ------------------------------------------------------------------
      # 7. AUTHENTIFICATION XRAY
      # ------------------------------------------------------------------
      - name: Authenticate to Xray
        shell: bash
        run: |
          TOKEN=$(curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
            https://eu.xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # 8. INSTALLATION DE JQ
      # ------------------------------------------------------------------
      - name: Install jq
        run: sudo apt-get install -y jq

      # ------------------------------------------------------------------
      # 9. ENVOI DES RESULTATS VERS XRAY
      # ------------------------------------------------------------------
      - name: Upload results to Xray
        shell: bash
        env:
          EXEC_NAME:    ${{ steps.exec_meta.outputs.exec_name }}
          EXEC_SUMMARY: ${{ steps.exec_meta.outputs.exec_summary }}
          EXEC_DATE:    ${{ steps.exec_meta.outputs.exec_date }}
          BRANCH:       ${{ steps.exec_meta.outputs.branch }}
          TRIGGER:      ${{ steps.exec_meta.outputs.trigger }}
        run: |
          if [ ! -f Result/output.xml ]; then
            echo "output.xml not found"
            exit 1
          fi

          TOTAL=$(grep -o 'status="PASS"\|status="FAIL"' Result/output.xml | wc -l)
          PASSED=$(grep -o 'status="PASS"' Result/output.xml | wc -l)
          FAILED=$(grep -o 'status="FAIL"' Result/output.xml | wc -l)

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            TRIGGER_DESC="planifiee automatiquement"
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TRIGGER_DESC="declenchee par une Pull Request"
          else
            TRIGGER_DESC="declenchee manuellement (Push)"
          fi
          DESC="Cette exécution de tests a été déclenchée automatiquement le ${EXEC_DATE}"

          jq -n \
            --arg summary "${EXEC_NAME}" \
            --arg desc    "${DESC}"      \
            --arg project "QATEAM"       \
            '{
              fields: {
                project:     { key: $project },
                summary:     $summary,
                issuetype:   { name: "Test Execution" },
                description: $desc
              }
            }' > /tmp/xray_info.json

          echo "--- testExecInfo envoye ---"
          cat /tmp/xray_info.json

          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -F "info=@/tmp/xray_info.json;type=application/json" \
            -F "results=@Result/output.xml;type=text/xml" \
            "https://eu.xray.cloud.getxray.app/api/v2/import/execution/robot/multipart")

          echo "===== XRAY RESPONSE ====="
          echo "$RESPONSE"
          echo "========================="

          EXEC_KEY=$(echo "$RESPONSE" | jq -r '.testExecIssue.key // .key // empty')

          if [ -z "$EXEC_KEY" ] || [ "$EXEC_KEY" = "null" ]; then
            echo "Multipart echoue - fallback envoi simple (sans nom personnalise)"

            RESPONSE=$(curl -s \
              -X POST \
              -H "Authorization: Bearer $XRAY_TOKEN" \
              -H "Content-Type: text/xml" \
              --data @"Result/output.xml" \
              "https://eu.xray.cloud.getxray.app/api/v2/import/execution/robot?projectKey=QATEAM")

            echo "===== XRAY FALLBACK RESPONSE ====="
            echo "$RESPONSE"
            echo "=================================="

            EXEC_KEY=$(echo "$RESPONSE" | jq -r '.testExecIssue.key // .key // empty')
          fi

          if [ -z "$EXEC_KEY" ] || [ "$EXEC_KEY" = "null" ]; then
            echo "Impossible de creer la Test Execution"
            exit 1
          fi

          echo "Test Execution creee : $EXEC_KEY"
          echo "https://hindmoustainbillah29.atlassian.net/browse/$EXEC_KEY"

          curl -s -X PUT \
            -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
            -H "Content-Type: application/json" \
            --data "{\"fields\":{\"summary\":\"${EXEC_NAME}\"}}" \
            "https://hindmoustainbillah29.atlassian.net/rest/api/3/issue/${EXEC_KEY}" \
            > /dev/null && echo "Summary mis a jour : ${EXEC_NAME}"

          echo "EXEC_KEY=$EXEC_KEY"                        >> $GITHUB_ENV
          echo "EXEC_STATS=${PASSED}P/${FAILED}F/${TOTAL}T" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # 10. CREATION AUTOMATIQUE DE BUGS JIRA
      # ------------------------------------------------------------------
      - name: Creer bugs Jira pour tests echoues
        if: always()
        env:
          JIRA_USER:         ${{ secrets.JIRA_USER }}
          JIRA_API_TOKEN:    ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL:     https://hindmoustainbillah29.atlassian.net
          PROJECT_KEY:       QATEAM
          EXEC_KEY:          ${{ env.EXEC_KEY }}
          ROBOT_PROJECT:     ${{ env.ROBOT_PROJECT_NAME }}
          BRANCH:            ${{ steps.exec_meta.outputs.branch }}
          EXEC_DATE:         ${{ steps.exec_meta.outputs.exec_date }}
          TRIGGER:           ${{ steps.exec_meta.outputs.trigger }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import json, os, re, urllib.request, urllib.error, base64, glob, mimetypes

          USER          = os.environ["JIRA_USER"]
          TOKEN         = os.environ["JIRA_API_TOKEN"]
          BASE          = os.environ["JIRA_BASE_URL"]
          PROJ          = os.environ["PROJECT_KEY"]
          EXEC_KEY      = os.environ.get("EXEC_KEY", "")
          ROBOT_PROJECT = os.environ.get("ROBOT_PROJECT", "Project1")
          BRANCH        = os.environ.get("BRANCH", "unknown")
          EXEC_DATE     = os.environ.get("EXEC_DATE", "")
          TRIGGER       = os.environ.get("TRIGGER", "")
          RUN_URL       = (
              f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}"
              f"/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"
          )

          creds   = base64.b64encode(f"{USER}:{TOKEN}".encode()).decode()
          headers = {
              "Authorization": f"Basic {creds}",
              "Content-Type":  "application/json",
              "Accept":        "application/json"
          }

          def jira(method, path, data=None):
              req = urllib.request.Request(
                  f"{BASE}/rest/api/3/{path}",
                  data=json.dumps(data).encode() if data else None,
                  headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      body = r.read().decode()
                      return json.loads(body) if body.strip() else {}
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()[:200]}

          def attach_file(issue_key, filepath):
              filename = os.path.basename(filepath)
              mime     = mimetypes.guess_type(filepath)[0] or "application/octet-stream"
              boundary = "----RobotCIBoundary"
              with open(filepath, "rb") as f:
                  file_data = f.read()
              body = (
                  f"--{boundary}\r\n"
                  f"Content-Disposition: form-data; name=\"file\"; filename=\"{filename}\"\r\n"
                  f"Content-Type: {mime}\r\n\r\n"
              ).encode() + file_data + f"\r\n--{boundary}--\r\n".encode()
              attach_headers = {
                  "Authorization":     f"Basic {creds}",
                  "X-Atlassian-Token": "no-check",
                  "Content-Type":      f"multipart/form-data; boundary={boundary}"
              }
              req = urllib.request.Request(
                  f"{BASE}/rest/api/3/issue/{issue_key}/attachments",
                  data=body, headers=attach_headers, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      resp = json.loads(r.read().decode())
                      if isinstance(resp, list) and resp:
                          return resp[0].get("id"), resp[0].get("content")
              except urllib.error.HTTPError as e:
                  print(f"    Erreur upload screenshot : {e.read().decode()[:100]}")
              return None, None

          def priority(msg):
              m = msg.lower()
              if any(k in m for k in ["critical", "crash", "timeout", "connection", "refused"]):
                  return "High"
              if any(k in m for k in ["assert", "expected", "found", "not found", "should be", "should contain"]):
                  return "Medium"
              return "Low"

          def bug_exists(summary):
              safe = summary.replace("\\", "\\\\").replace('"', '\\"')
              jql_open = urllib.request.quote(
                  f'project={PROJ} AND issuetype=Bug AND summary="{safe}" AND statusCategory != Done')
              r = jira("GET", f"search?jql={jql_open}&maxResults=1&fields=summary,status")
              if r.get("total", 0) > 0:
                  return r["issues"][0]["key"]
              return None

          def link_to_execution(bug_key):
              if not EXEC_KEY:
                  return
              r = jira("POST", "issueLink", {
                  "type":         {"name": "Blocks"},
                  "inwardIssue":  {"key": bug_key},
                  "outwardIssue": {"key": EXEC_KEY}
              })
              if r.get("error"):
                  print(f"    Lien {bug_key} -> {EXEC_KEY} echoue : {str(r['error'])[:80]}")
              else:
                  print(f"    Lie a {EXEC_KEY}")

          def get_error_details(test, st):
              main_msg = st.get("message", "").strip()
              error_lines = []
              for el in test.iter("msg"):
                  if el.get("level") in ("FAIL", "ERROR") and el.text:
                      line = el.text.strip()
                      if line and line not in error_lines:
                          error_lines.append(line)
              failed_keyword  = None
              keyword_args    = []
              keyword_library = None
              for kw in test.iter("kw"):
                  kst = kw.find("status")
                  if kst is not None and kst.get("status") == "FAIL":
                      failed_keyword  = kw.get("name", "")
                      keyword_library = kw.get("library", "")
                      for arg in kw.iter("arg"):
                          if arg.text:
                              keyword_args.append(arg.text.strip())
                      break
              return {
                  "main":    main_msg or (error_lines[0] if error_lines else "Aucun message"),
                  "lines":   error_lines,
                  "keyword": failed_keyword,
                  "args":    keyword_args,
                  "library": keyword_library
              }

          def find_screenshot(test_name):
              clean = test_name.replace(" ", "*").replace("/", "*")
              for pattern in [
                  f"Result/*{clean}*.png",
                  f"Result/*{clean}*.jpg",
                  "Result/browser/screenshot/*.png",
                  "Result/browser/screenshot/*.jpg",
                  "Result/*.png",
                  "Result/*.jpg"
              ]:
                  files = sorted(glob.glob(pattern))
                  if files:
                      return files[-1]
              return None

          # ----------------------------------------------------------------
          # NOUVELLES FONCTIONS : lecture doc + keywords depuis output.xml
          # ----------------------------------------------------------------

          # Keywords à ignorer dans les étapes de reproduction
          _IGNORE_KW = {
              "close browser", "close page", "close context",
              "log", "comment", "set variable", "set suite variable",
              "set test variable", "run keyword if", "run keywords"
          }

          def get_test_documentation(test):
              """
              Lit la balise <doc> du test Robot Framework.
              Correspond à [Documentation] dans le fichier .robot.
              Retourne None si absente ou vide.
              """
              doc_el = test.find("doc")
              if doc_el is not None and doc_el.text and doc_el.text.strip():
                  return doc_el.text.strip()
              return None

          def get_steps_from_keywords(test):
              """
              Extrait les étapes de reproduction depuis les keywords de niveau 1
              du test (test.findall("kw") = direct children uniquement).

              Ces keywords correspondent aux appels customs dans le .robot :
                  Open Login Page
                  Login    standard_user    secret_sauce
                  Verify Login Success

              Pour chaque keyword :
              - Son nom devient le libellé de l'étape
              - Ses arguments sont ajoutés entre parenthèses (max 2, filtrés)

              Les keywords utilitaires (Close Browser, Log, etc.) sont ignorés.
              """
              IGNORE = _IGNORE_KW
              steps  = []

              for kw in test.findall("kw"):   # niveau 1 seulement
                  name = kw.get("name", "").strip()
                  if not name or name.lower() in IGNORE:
                      continue

                  # Arguments directs du keyword (pas ceux des sous-keywords)
                  args = [
                      a.text.strip()
                      for a in kw.findall("arg")
                      if a.text and a.text.strip() and a.text.strip() != "${EMPTY}"
                  ]

                  if args:
                      # Tronque les args trop longs pour la lisibilité
                      readable = [a if len(a) <= 50 else a[:47] + "..." for a in args[:2]]
                      label = f"{name} ({', '.join(readable)})"
                  else:
                      label = name

                  steps.append(label)

              return steps if steps else None

          def human_error(test_el, error, test_name):
              """
              Génère le texte du bug détecté.

              Priorité :
              1. [Documentation] du test → objectif métier clair
              2. Regex sur le message d'erreur → fallback descriptif
              """
              doc = get_test_documentation(test_el)
              msg = error["main"]
              kw  = error.get("keyword") or "inconnu"

              if doc:
                  # La documentation décrit ce que le test DEVRAIT faire.
                  # Le bug = cet objectif n'a pas été atteint.
                  lines = [f"Objectif du test : {doc}", ""]
                  lines.append(f"Erreur rencontrée lors de l'exécution du keyword '{kw}' :")
                  lines.append(msg)
                  return "\n".join(lines)

              # ── Fallback regex (si pas de [Documentation]) ──────────────
              m = re.search(r"Text '(.+?)' \(str\) should be '(.+?)' \(str\)", msg)
              if m:
                  actual, expected = m.group(1), m.group(2)
                  return (
                      f"Le titre affiché sur la page est incorrect.\n"
                      f"Titre affiché : '{actual}'\n"
                      f"Titre attendu : '{expected}'\n\n"
                      f"Le titre de la page ne correspond pas au résultat attendu."
                  )

              m = re.search(
                  r"'(.+?)' should (contain|be equal to|not contain|start with|end with) '(.+?)'",
                  msg, re.IGNORECASE)
              if m:
                  return (
                      f"Une vérification a échoué dans le test '{test_name}'.\n"
                      f"Valeur obtenue : '{m.group(1)}'\n"
                      f"Condition attendue : {m.group(2)} '{m.group(3)}'"
                  )

              if "timeout" in msg.lower():
                  locator_match = re.search(r"waiting for locator\('(.+?)'\)", msg)
                  locator_info  = f" '{locator_match.group(1)}'" if locator_match else ""
                  return (
                      f"L'élément{locator_info} est introuvable sur la page "
                      f"lors de l'exécution du keyword '{kw}'.\n"
                      f"Vérifier si l'élément a été supprimé, renommé ou si la page ne charge pas."
                  )

              if "element" in msg.lower() and any(
                      k in msg.lower() for k in ["not found", "not visible", "not attached"]):
                  return (
                      f"Un élément de la page est introuvable ou non visible "
                      f"lors de l'exécution du keyword '{kw}'.\n"
                      f"Détail technique : {msg}"
                  )

              return (
                  f"Le test '{test_name}' a échoué lors de l'exécution du keyword '{kw}'.\n"
                  f"Détail technique : {msg}"
              )

          def build_steps(test_el, test_name, suite_name, error):
              """
              Génère les étapes de reproduction.

              Priorité :
              1. Keywords de niveau 1 du test (Open Login Page, Login, Verify…)
                 → étapes métier directement issues du fichier .robot
              2. Fallback générique si aucun keyword utilisable trouvé
              """
              steps = get_steps_from_keywords(test_el)

              if steps:
                  # Ajoute la mention screenshot en dernière étape
                  steps.append(
                      "Consulter le screenshot joint pour voir l'état de la page au moment de l'échec."
                  )
                  return steps

              # ── Fallback générique ───────────────────────────────────────
              kw = error.get("keyword") or ""
              return [
                  "Ouvrir un navigateur et accéder à l'application testée.",
                  f"Naviguer vers la page correspondant à la suite '{suite_name}'.",
                  f"Reproduire manuellement les actions du test '{test_name}'.",
                  f"Observer le comportement de l'application à l'étape '{kw}'." if kw
                  else "Observer le comportement de l'application.",
                  "Consulter le log complet dans les artefacts du run CI/CD.",
                  "Consulter le screenshot joint pour voir l'état de la page au moment de l'échec."
              ]

          # ----------------------------------------------------------------
          # CONSTRUCTION DE LA DESCRIPTION JIRA (format ADF)
          # ----------------------------------------------------------------

          def build_description(test_el, test_name, suite_name, error, has_screenshot=False):

              def para(text):
                  return {"type": "paragraph",
                          "content": [{"type": "text", "text": text}]}

              def heading(text, level=3):
                  return {"type": "heading", "attrs": {"level": level},
                          "content": [{"type": "text", "text": text}]}

              def rule():
                  return {"type": "rule"}

              def code_block(text):
                  return {"type": "codeBlock", "attrs": {"language": "text"},
                          "content": [{"type": "text", "text": text}]}

              def bullet_list(items):
                  return {
                      "type": "bulletList",
                      "content": [
                          {"type": "listItem", "content": [para(item)]}
                          for item in items
                      ]
                  }

              def ordered_list(items):
                  return {
                      "type": "orderedList",
                      "content": [
                          {"type": "listItem", "content": [para(item)]}
                          for item in items
                      ]
                  }

              content = []

              # 1. Identification du test
              content.append(heading("Identification du test", 3))
              content.append(bullet_list([
                  f"Projet Robot Framework : {ROBOT_PROJECT}",
                  f"Suite : {suite_name}",
                  f"Test : {test_name}",
                  f"Date d'exécution : {EXEC_DATE}",
              ]))
              content.append(rule())

              # 2. Bug détecté — utilise human_error() qui lit la [Documentation]
              content.append(heading("Bug détecté", 3))
              for line in human_error(test_el, error, test_name).split("\n"):
                  if line.strip():
                      content.append(para(line.strip()))
              if error.get("lines") and len(error["lines"]) > 1:
                  content.append(heading("Détail technique", 4))
                  content.append(code_block("\n".join(error["lines"])))
              content.append(rule())

              # 3. Étapes de reproduction — issues des keywords .robot
              content.append(heading("Étapes de reproduction", 3))
              content.append(ordered_list(
                  build_steps(test_el, test_name, suite_name, error)
              ))
              content.append(rule())

              # 4. Liens utiles
              content.append(heading("Liens utiles", 3))
              link_items = [f"Run CI/CD : {RUN_URL}"]
              if EXEC_KEY:
                  link_items.append(f"Test Execution Xray : {BASE}/browse/{EXEC_KEY}")
              if has_screenshot:
                  link_items.append("Screenshot : voir pièce jointe attachée au ticket")
              content.append(bullet_list(link_items))

              return {"version": 1, "type": "doc", "content": content}

          # ----------------------------------------------------------------
          # LECTURE DU OUTPUT.XML ET COLLECTE DES ECHECS
          # ----------------------------------------------------------------

          try:
              root = ET.parse("Result/output.xml").getroot()
          except Exception as e:
              print(f"Erreur de lecture output.xml : {e}")
              exit(0)

          fails = []
          for suite in root.iter("suite"):
              suite_name = suite.get("name", "Suite inconnue")
              for test in suite.findall("test"):
                  st = test.find("status")
                  if st is not None and st.get("status") == "FAIL":
                      fails.append({
                          "name":    test.get("name", "?"),
                          "suite":   suite_name,
                          "error":   get_error_details(test, st),
                          "test_el": test          # élément XML complet pour doc + keywords
                      })

          if not fails:
              print("Aucun test échoué - pas de bug à créer.")
              exit(0)

          print(f"\n{'='*65}")
          print(f"  CREATION DES BUGS JIRA - {ROBOT_PROJECT} - {EXEC_DATE}")
          print(f"{'='*65}\n")

          created = skipped = errors = 0

          for t in fails:
              summary = f"[{ROBOT_PROJECT}] {t['name']}"
              key     = bug_exists(summary)

              if key:
                  print(f"  IGNORE (deja ouvert -> {key}) : {t['name']}")
                  link_to_execution(key)
                  skipped += 1
                  continue

              screenshot_path = find_screenshot(t["name"])
              has_screenshot  = screenshot_path is not None
              prio            = priority(t["error"]["main"])
              desc            = build_description(
                                    t["test_el"],
                                    t["name"],
                                    t["suite"],
                                    t["error"],
                                    has_screenshot
                                )

              payload = {"fields": {
                  "project":     {"key": PROJ},
                  "summary":     summary,
                  "issuetype":   {"name": "Bug"},
                  "priority":    {"name": prio},
                  "labels":      ["automated", "robot-framework", "ci-cd", ROBOT_PROJECT.lower()],
                  "description": desc
              }}

              r = jira("POST", "issue", payload)

              if r.get("key"):
                  new_key = r["key"]
                  print(f"  CREE [{prio:<6}] -> {new_key} : {t['name']}")
                  if screenshot_path:
                      att_id, _ = attach_file(new_key, screenshot_path)
                      if att_id:
                          print(f"    Screenshot attaché : {os.path.basename(screenshot_path)}")
                      else:
                          print(f"    Échec de l'upload du screenshot")
                  else:
                      print(f"    Aucun screenshot disponible pour ce test")
                  link_to_execution(new_key)
                  created += 1
              else:
                  print(f"  ERREUR : {t['name']} -- {str(r.get('error','?'))[:80]}")
                  errors += 1

          print(f"\n{'='*65}")
          print(f"  Créés : {created}   Ignorés : {skipped}" +
                (f"   Erreurs : {errors}" if errors else ""))
          print(f"{'='*65}")
          PYEOF

      # ------------------------------------------------------------------
      # 11. SAUVEGARDE DES ARTEFACTS
      # ------------------------------------------------------------------
      - name: Upload Robot Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/
