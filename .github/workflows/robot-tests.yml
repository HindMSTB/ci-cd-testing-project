name: Robot Framework CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-browser

      - name: Install Playwright Browsers
        run: |
          python -m Browser.entry init

      - name: Run Robot Framework Tests
        continue-on-error: true
        run: |
          robot \
            --outputdir Result \
            --output output.xml \
            --log log.html \
            --report report.html \
            Tests/

      - name: Verify output.xml
        run: |
          echo "===== RESULT FOLDER ====="
          ls -lah Result/
          echo "===== OUTPUT.XML ====="
          head -50 Result/output.xml

      - name: Authenticate to Xray
        shell: bash
        run: |
          TOKEN=$(curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
            https://eu.xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Upload results to Xray
        shell: bash
        run: |
          if [ ! -f Result/output.xml ]; then
            echo "❌ output.xml not found"
            exit 1
          fi

          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -H "Content-Type: text/xml" \
            --data @"Result/output.xml" \
            "https://eu.xray.cloud.getxray.app/api/v2/import/execution/robot?projectKey=QATEAM")

          echo "===== XRAY RESPONSE ====="
          echo "$RESPONSE"

          EXEC_KEY=$(echo "$RESPONSE" | jq -r '.testExecIssue.key // .key')

          if [ "$EXEC_KEY" = "null" ] || [ -z "$EXEC_KEY" ]; then
            echo "❌ Failed to create Test Execution"
            exit 1
          fi

          echo "=================================="
          echo "✅ Test Execution Created: $EXEC_KEY"
          echo "🔗 https://hindmoustainbillah29.atlassian.net/browse/$EXEC_KEY"
          echo "=================================="

      - name: Afficher statistiques des tests
        if: always()
        run: |
          echo "================================================"
          echo "           📊 RAPPORT DES TESTS                 "
          echo "================================================"

          # Extraire stats depuis output.xml
          TOTAL=$(grep -oP 'tests="\K[0-9]+' Result/output.xml | head -1 || echo "0")
          PASSED=$(grep -oP 'pass="\K[0-9]+' Result/output.xml | head -1 || echo "0")
          FAILED=$(grep -oP 'fail="\K[0-9]+' Result/output.xml | head -1 || echo "0")
          SKIPPED=$(grep -oP 'skip="\K[0-9]+' Result/output.xml | head -1 || echo "0")

          echo ""
          echo "┌─────────────────────┬────────┐"
          echo "│ Statut              │ Nombre │"
          echo "├─────────────────────┼────────┤"
          printf "│ ✅ Tests réussis    │ %-6s │\n" "$PASSED"
          printf "│ ❌ Tests échoués   │ %-6s │\n" "$FAILED"
          printf "│ ⏭️  Tests ignorés   │ %-6s │\n" "$SKIPPED"
          printf "│ 📋 Total            │ %-6s │\n" "$TOTAL"
          echo "└─────────────────────┴────────┘"

          echo ""
          echo "================================================"
          echo "           ❌ TESTS ÉCHOUÉS                     "
          echo "================================================"

          # Extraire les tests échoués
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import sys

          try:
              tree = ET.parse('Result/output.xml')
              root = tree.getroot()

              failed_tests = []
              for test in root.iter('test'):
                  status = test.find('status')
                  if status is not None and status.get('status') == 'FAIL':
                      name = test.get('name', 'Inconnu')
                      message = status.get('message', 'Pas de message')
                      failed_tests.append((name, message))

              if failed_tests:
                  print(f"{'Nom du test':<45} {'Message d erreur'}")
                  print("-" * 90)
                  for name, msg in failed_tests:
                      short_msg = msg[:40] + "..." if len(msg) > 40 else msg
                      print(f"{name:<45} {short_msg}")
              else:
                  print("✅ Aucun test échoué !")

          except Exception as e:
              print(f"Erreur lecture XML: {e}")
          PYEOF

          echo ""
          echo "================================================"
          echo "           ✅ TESTS RÉUSSIS                     "
          echo "================================================"

          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET

          try:
              tree = ET.parse('Result/output.xml')
              root = tree.getroot()

              passed_tests = []
              for test in root.iter('test'):
                  status = test.find('status')
                  if status is not None and status.get('status') == 'PASS':
                      name = test.get('name', 'Inconnu')
                      passed_tests.append(name)

              if passed_tests:
                  for i, name in enumerate(passed_tests, 1):
                      print(f"  {i:>2}. ✅ {name}")
              else:
                  print("❌ Aucun test réussi.")

          except Exception as e:
              print(f"Erreur lecture XML: {e}")
          PYEOF

          echo ""
          echo "================================================"
          echo "   Artifacts disponibles : Result/"
          echo "     - output.xml"
          echo "     - log.html"
          echo "     - report.html"
          echo "================================================"

      - name: Upload Robot Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/
