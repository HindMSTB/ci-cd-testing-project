name: Robot Framework CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-browser

      - name: Install Playwright Browsers
        run: |
          python -m Browser.entry init

      - name: Run Robot Framework Tests
        run: |
          python -m robot -d Result Tests/ || true

      - name: Generate Clean Summary
        run: |
          python - <<EOF > summary.md
import xml.etree.ElementTree as ET

tree = ET.parse('Result/output.xml')
root = tree.getroot()

tests = root.findall(".//test")

passed = 0
failed = 0

print("## 🚀 Robot Framework Results")
print("| Status | Count |")
print("|--------|--------|")

for t in tests:
    status = t.find("status").attrib.get("status")
    if status == "PASS":
        passed += 1
    elif status == "FAIL":
        failed += 1

print(f"| PASS | {passed} |")
print(f"| FAIL | {failed} |")

print("\n## 🧪 Detailed Test Results")
print("| Test Case | Status |")
print("|-----------|--------|")

for t in tests:
    name = t.attrib.get("name")
    status = t.find("status").attrib.get("status")

    if status == "PASS":
        print(f"| {name} | ✅ PASS |")
    else:
        print(f"| {name} | ❌ FAIL |")
EOF

          cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Robot Results
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/