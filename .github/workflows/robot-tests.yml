name: Robot Framework CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-browser

      - name: Install Playwright Browsers
        run: |
          python -m Browser.entry init

      - name: Run Robot Framework Tests
        continue-on-error: true
        run: |
          robot \
            --outputdir Result \
            --output output.xml \
            --log log.html \
            --report report.html \
            Tests/

      - name: Verify output.xml
        run: |
          echo "===== RESULT FOLDER ====="
          ls -lah Result/
          echo "===== OUTPUT.XML ====="
          head -50 Result/output.xml

      - name: Authenticate to Xray
        shell: bash
        run: |
          TOKEN=$(curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
            https://eu.xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Upload results to Xray
        shell: bash
        run: |
          if [ ! -f Result/output.xml ]; then
            echo "❌ output.xml not found"
            exit 1
          fi

          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -H "Content-Type: text/xml" \
            --data @"Result/output.xml" \
            "https://eu.xray.cloud.getxray.app/api/v2/import/execution/robot?projectKey=QATEAM")

          echo "===== XRAY RESPONSE ====="
          echo "$RESPONSE"

          EXEC_KEY=$(echo "$RESPONSE" | jq -r '.testExecIssue.key // .key')

          if [ "$EXEC_KEY" = "null" ] || [ -z "$EXEC_KEY" ]; then
            echo "❌ Failed to create Test Execution"
            exit 1
          fi

          echo "=================================="
          echo "✅ Test Execution Created: $EXEC_KEY"
          echo "🔗 https://hindmoustainbillah29.atlassian.net/browse/$EXEC_KEY"
          echo "=================================="

      - name: Upload Robot Results
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/

          