name: Robot Framework CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install robotframework
          pip install robotframework-browser

      - name: Install Playwright Browsers
        run: |
          python -m Browser.entry init

      # ⚠️ FIX IMPORTANT: enlever || true pour voir les vrais erreurs
      - name: Run Robot Framework Tests
        run: |
          robot -d Result Tests/

      # =========================
      # XRAY AUTH
      # =========================
      - name: Authenticate to Xray
        shell: bash
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
            https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')

          echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV

      # =========================
      # XRAY UPLOAD (CORRECT)
      # =========================
      - name: Upload results to Xray
        shell: bash
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -F "file=@Result/output.xml" \
            "https://xray.cloud.getxray.app/api/v2/import/execution/robot?projectKey=SCRUM")

          echo "$RESPONSE"

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload Robot Results
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: Result/